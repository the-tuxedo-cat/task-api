services:
  - type: web
    name: project-collaboration-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run render-build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: project-collaboration-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: project-collaboration-db
    plan: free
